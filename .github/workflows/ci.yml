name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dbtui
          POSTGRES_PASSWORD: dbtui
          POSTGRES_DB: dbtui_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dbtui -d dbtui_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Init test database
        env:
          PGHOST: localhost
          PGPORT: "5433"
          PGUSER: dbtui
          PGPASSWORD: dbtui
          PGDATABASE: dbtui_test
        run: psql -f testdata/init.sql

      - name: Run tests
        env:
          DBTUI_TEST_DSN: postgres://dbtui:dbtui@localhost:5433/dbtui_test?sslmode=disable
        run: go test ./... -v -count=1

      - name: Build
        run: go build -o dbtui ./cmd/dbtui/
